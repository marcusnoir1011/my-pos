version: "3.9"

services:
  db:
    image: postgres:15
    container_name: pos_postgres
    restart: always
    environment:
      environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: simplepost
      POSTGRES_DB: posdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: